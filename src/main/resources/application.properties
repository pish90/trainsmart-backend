server.port=8080
spring.application.name=trainsmart-backend

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/trainsmart}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

anthropic.api.key=${ANTHROPIC_API_KEY:changeme}
anthropic.api.url=https://api.anthropic.com/v1/messages
anthropic.model=claude-sonnet-4-20250514

strava.client.id=${STRAVA_CLIENT_ID:0}
strava.client.secret=${STRAVA_CLIENT_SECRET:changeme}
strava.redirect.uri=${STRAVA_REDIRECT_URI:http://localhost:8080/api/auth/strava/callback}
strava.webhook.verify.token=${STRAVA_WEBHOOK_VERIFY_TOKEN:changeme}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

spring.security.oauth2.client.registration.strava.client-id=${STRAVA_CLIENT_ID:0}
spring.security.oauth2.client.registration.strava.client-secret=${STRAVA_CLIENT_SECRET:changeme}
spring.security.oauth2.client.registration.strava.scope=activity:read_all
spring.security.oauth2.client.registration.strava.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.strava.redirect-uri=${STRAVA_REDIRECT_URI:http://localhost:8080/api/auth/strava/callback}
spring.security.oauth2.client.provider.strava.authorization-uri=https://www.strava.com/oauth/authorize
spring.security.oauth2.client.provider.strava.token-uri=https://www.strava.com/oauth/token
spring.security.oauth2.client.provider.strava.user-info-uri=https://www.strava.com/api/v3/athlete
spring.security.oauth2.client.provider.strava.user-name-attribute=id
