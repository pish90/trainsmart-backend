spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

anthropic.api.key=test-key
anthropic.api.url=https://api.anthropic.com/v1/messages
anthropic.model=claude-sonnet-4-6

strava.client.id=12345
strava.client.secret=test-secret
strava.redirect.uri=http://localhost:8080/api/auth/strava/callback
strava.webhook.verify.token=test-verify-token

app.cors.allowed-origins=*
app.frontend.url=http://localhost:5173

spring.security.oauth2.client.registration.strava.client-id=12345
spring.security.oauth2.client.registration.strava.client-secret=test-secret
spring.security.oauth2.client.registration.strava.scope=activity:read_all
spring.security.oauth2.client.registration.strava.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.strava.redirect-uri=http://localhost:8080/api/auth/strava/callback
spring.security.oauth2.client.provider.strava.authorization-uri=https://www.strava.com/oauth/authorize
spring.security.oauth2.client.provider.strava.token-uri=https://www.strava.com/oauth/token
spring.security.oauth2.client.provider.strava.user-info-uri=https://www.strava.com/api/v3/athlete
spring.security.oauth2.client.provider.strava.user-name-attribute=id
